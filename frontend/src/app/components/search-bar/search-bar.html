<div class="sb-bar" [class.open]="dropdownOpen">
  <span class="sb-icon">
    @if (loading) {
      <svg class="spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    } @else {
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    }
  </span>
  <input
    class="sb-input"
    type="text"
    [placeholder]="placeholder"
    [(ngModel)]="searchTerm"
    (input)="onInput()"
    (keydown)="onKeydown($event)"
    autocomplete="off"
  />
  @if (searchTerm) {
    <button class="sb-clear" (click)="clear()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  }
</div>

@if (dropdownOpen && results.length > 0) {
  <ul class="sb-dropdown">
    @for (p of results; track p.id) {
      <li class="sb-item" (click)="select(p)">
        <img class="sb-thumb" [src]="p.headshot" [alt]="p.name" />
        <div class="sb-meta">
          <span class="sb-name">{{ p.name }}</span>
          <span class="sb-pos">
            {{ p.position }}@if (p.team_abbreviation) { · {{ p.team_abbreviation }} }
          </span>
        </div>
      </li>
    }
  </ul>
}
